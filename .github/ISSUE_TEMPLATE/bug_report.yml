name: Bug report
description: Create a report to help us improve
title: "[Bug]: "
labels: []
assignees:
  - qianlifeng

body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Select your operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Linux Environment
        The following two fields are only required for Linux users.
        If you are on macOS or Windows, select "N/A".

  - type: dropdown
    id: desktop_environment
    attributes:
      label: Desktop Environment
      description: Linux only. Select "N/A" if you are not a Linux user.
      options:
        - N/A (not a Linux user)
        - GNOME
        - KDE Plasma
        - XFCE
        - Other (specify in Description)
    validations:
      required: true

  - type: dropdown
    id: display_server
    attributes:
      label: Display Server
      description: Linux only. Select "N/A" if you are not a Linux user.
      options:
        - N/A (not a Linux user)
        - Wayland
        - X11 (Xorg)
        - Not sure
    validations:
      required: true

  - type: input
    id: wox_version
    attributes:
      label: Wox Version
      description: You can find it in Wox Settings -> About
      placeholder: v2.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened? What did you expect?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Logs
        Please upload the Wox log to help identify your bug.
        Attach the log file in the **Description** editor area where GitHub shows:
        `Paste, drop, or click to add files`

        Log path:
        - `~/.wox/log/wox.log` if you use macOS or Linux
        - `C:\Users\<yourname>\.wox\log\wox.log` if you use Windows
